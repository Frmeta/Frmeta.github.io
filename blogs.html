---
layout: default
title: Blog
---

<div>
    <div class="fancy-header">
        <h3>Blogs</h3>
    </div>
    <div class="histories">
        {% assign sorted_posts = site.posts | sort: "date" | reverse %}
        {% for post in sorted_posts %}
            <div class="history">
                <div class="date-range">
                    <p>{{ post.date | date: "%b %Y" }}</p>
                </div>
                <div class="event">
                    <a href="{{ post.url }}" class="event-title">{{ post.title }}</a>

                    <p>{{ post.description }}</p>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
